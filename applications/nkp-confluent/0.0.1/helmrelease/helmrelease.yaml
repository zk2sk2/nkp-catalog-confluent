apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cfk-chart
  namespace: ${releaseNamespace}
spec:
  interval: 6h
  url: oci://ghcr.io/zk2sk2/helm-cp-cfk/confluent-for-kubernetes
  ref:
    tag: 0.1514.1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: confluent-for-kubernetes
  namespace: ${releaseNamespace}
spec:
  interval: 15s
  chartRef:
    kind: OCIRepository
    name: cfk-chart
    namespace: ${releaseNamespace}
  targetNamespace: ${releaseNamespace}
  install:
    create
